# Configuración global de Prometheus
global:
  scrape_interval: 30s       # Cada cuánto obtener métricas (30 segundos)
  evaluation_interval: 30s   # Cada cuánto evaluar reglas de alertas

# Qué servicios monitorear
scrape_configs:
  # Job 1: Tu API Go
  - job_name: 'go-api'
    scrape_interval: 30s
    static_configs:
      - targets: ['api:8080']  # Nombre del servicio y puerto